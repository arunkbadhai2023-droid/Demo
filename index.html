<html lang="en">

<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover" />
<title>Sprout — your AI life companion</title>
<meta name="description" content="A gentle AI companion that meets you where you are." />

<meta name="apple-mobile-web-app-capable" content="yes" />

<style>
  :root{
    --paper:#F4EFE7; --paper2:#FBF8F2; --card:#FFFFFF;
    --ink:#2B2620; --ink-soft:#7A6F61; --ink-faint:#A99F90; --line:#E7DECF;
    --sage:#4F7A6B; --sage-mid:#5E8C7C; --sage-tint:#E7EFE9;
    --clay:#C8714E; --clay-tint:#F6E7DD;
    --dusk:#5C5A7A; --dusk-tint:#E9E8F0;
    --honey:#C0892B; --honey-tint:#F3E8CE;
    --care:#A8412C; --care-tint:#F7E4DD;
    --serif:'Fraunces', Georgia, 'Times New Roman', serif;
    --sans:'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
  }
  *{box-sizing:border-box; -webkit-tap-highlight-color:transparent;}
  html,body{margin:0; padding:0;}
  body{
    font-family:var(--sans); color:var(--ink);
    background:var(--paper);
    min-height:100vh; min-height:100dvh;
  }
  button{font-family:inherit; cursor:pointer; border:none; background:none;}
  button:focus-visible, [tabindex]:focus-visible, textarea:focus-visible, input:focus-visible{
    outline:2px solid var(--sage); outline-offset:2px;
  }
  ::-webkit-scrollbar{width:0; height:0;}

  /* MOBILE-FIRST: the app fills the whole screen like a native app */
  .phone{
    width:100%; height:100vh; height:100dvh; background:var(--paper);
    overflow:hidden; position:relative; display:flex; flex-direction:column;
  }
  /* DESKTOP: present it in a centred device frame on a warm backdrop */
  @media (min-width:600px){
    body{
      background:radial-gradient(1200px 620px at 72% -12%, var(--paper2), var(--paper) 60%);
      display:flex; justify-content:center; align-items:flex-start; padding:24px 12px;
    }
    .phone{
      max-width:430px; height:min(880px,94vh); border-radius:34px;
      border:1px solid var(--line); box-shadow:0 30px 90px rgba(43,38,32,.20);
    }
  }
  .scroll{flex:1; overflow-y:auto;}
  .pad{padding:6px 20px 20px;}
  #watermark{position:absolute; inset:0; z-index:0; pointer-events:none;}
  #moodaura{position:absolute; inset:0; z-index:0; pointer-events:none;}
  .topbar, .scroll, .tabbar{position:relative; z-index:1;}

  html.reduce-motion *{animation:none!important; transition:none!important;}
  html.readable-font{ letter-spacing:.01em; }
  html.readable-font .h1, html.readable-font .brand .name{ letter-spacing:0; }

  .toast{position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(0); z-index:200;
    background:var(--ink); color:var(--paper); padding:12px 18px; border-radius:999px; font-size:14px; font-weight:600;
    display:flex; align-items:center; gap:9px; box-shadow:0 12px 34px rgba(0,0,0,.28); animation:toastIn .3s ease, toastOut .3s ease 2.4s forwards; max-width:88vw;}
  @keyframes toastIn{from{opacity:0; transform:translateX(-50%) translateY(20px);}to{opacity:1; transform:translateX(-50%) translateY(0);}}
  @keyframes toastOut{to{opacity:0; transform:translateX(-50%) translateY(14px);}}
  .confetti{position:fixed; top:0; left:0; width:10px; height:14px; z-index:199; pointer-events:none; border-radius:2px; will-change:transform,opacity; animation:confFall 1.5s cubic-bezier(.2,.6,.3,1) forwards;}
  @keyframes confFall{0%{opacity:1; transform:translateY(-10vh) rotate(0);}100%{opacity:0; transform:translateY(70vh) rotate(540deg);}}

  .h1{font-family:var(--serif); letter-spacing:-.015em; color:var(--ink);}
  .eyebrow{font-size:11px; font-weight:700; letter-spacing:.14em; text-transform:uppercase; color:var(--ink-soft);}
  .muted{color:var(--ink-soft);}
  .faint{color:var(--ink-faint);}

  .card{
    background:var(--card); border:1px solid var(--line); border-radius:24px; padding:18px;
    box-shadow:0 1px 2px rgba(43,38,32,.04), 0 8px 24px rgba(43,38,32,.04);
  }
  .tap{transition:transform .12s ease;} .tap:active{transform:scale(.96);}

  .btn{border-radius:999px; font-weight:600; font-size:15px; padding:13px 18px; border:1px solid transparent; transition:transform .1s ease;}
  .btn:active{transform:scale(.96);} .btn[disabled]{opacity:.42; pointer-events:none;}
  .btn-primary{background:var(--sage); color:#fff;}
  .btn-clay{background:var(--clay); color:#fff;}
  .btn-soft{background:var(--sage-tint); color:var(--sage);}
  .btn-ghost{background:transparent; color:var(--ink); border-color:var(--line);}
  .btn-block{width:100%;}

  .pill{border-radius:999px; padding:10px 15px; font-size:13.5px; font-weight:500; border:1.5px solid var(--line); background:var(--card); color:var(--ink); transition:transform .1s;}
  .pill:active{transform:scale(.95);}

  .topbar{display:flex; align-items:center; justify-content:space-between; padding:calc(14px + env(safe-area-inset-top, 0px)) 20px 10px; background:var(--paper);}
  .brand{display:flex; align-items:center; gap:9px;}
  .brand .logo{width:30px; height:30px; border-radius:10px; background:var(--sage); display:grid; place-items:center;}
  .brand .name{font-family:var(--serif); font-size:21px; letter-spacing:-.01em;}
  .help-btn{display:flex; align-items:center; gap:6px; padding:7px 13px; border-radius:999px; background:var(--care-tint); color:var(--care); font-size:12.5px; font-weight:700; border:1px solid rgba(168,65,44,.13);}

  .tabbar{flex-shrink:0; background:rgba(251,248,242,.93); backdrop-filter:blur(10px); border-top:1px solid var(--line); padding:10px 8px calc(12px + env(safe-area-inset-bottom, 0px)); display:flex; justify-content:space-around; align-items:flex-end;}
  .tab{display:flex; flex-direction:column; align-items:center; gap:5px; padding:4px 6px; width:62px;}
  .tab span{font-size:10.5px; font-weight:500;}
  .tab.center{margin-top:-18px;}
  .tab .fab{width:52px; height:52px; border-radius:18px; background:var(--clay); display:grid; place-items:center; box-shadow:0 8px 20px rgba(200,113,78,.4);}

  .iconwrap{display:grid; place-items:center; flex-shrink:0;}
  .row{display:flex; align-items:center; gap:12px;}

  textarea, input{font-family:var(--sans); color:var(--ink); background:var(--card); border:1px solid var(--line); outline:none;}
  textarea{resize:none;}

  .bubble{max-width:80%; padding:11px 14px; border-radius:18px; font-size:14.5px; line-height:1.5;}
  .bubble.user{background:var(--clay); color:#fff; border-bottom-right-radius:6px;}
  .bubble.bot{background:var(--card); color:var(--ink); border:1px solid var(--line); border-bottom-left-radius:6px;}

  .overlay{position:absolute; inset:0; z-index:60; background:rgba(43,38,32,.34); display:flex; align-items:flex-end; animation:fade .2s ease;}
  .sheet{width:100%; max-height:90%; overflow-y:auto; background:var(--paper); border-top-left-radius:28px; border-top-right-radius:28px; animation:slide .28s cubic-bezier(.2,.8,.2,1); padding-bottom:env(safe-area-inset-bottom, 0px);}
  .grip{width:40px; height:5px; border-radius:99px; background:var(--line); margin:12px auto 0;}

  .step-row{display:flex; gap:13px; align-items:flex-start; padding:14px; border-radius:16px; background:var(--paper2); border:1px solid var(--line);}
  .step-num{width:24px; height:24px; border-radius:8px; color:#fff; font-size:13px; font-weight:700; display:grid; place-items:center; flex-shrink:0;}

  .dot{width:7px; height:7px; border-radius:99px; background:var(--sage); display:inline-block; animation:pulse 1s infinite ease-in-out;}

  @keyframes fade{from{opacity:0}to{opacity:1}}
  @keyframes slide{from{transform:translateY(22px); opacity:.6}to{transform:translateY(0); opacity:1}}
  @keyframes pulse{0%,100%{opacity:.3; transform:scale(.8)}50%{opacity:1; transform:scale(1.1)}}
  @keyframes slideRight{from{transform:translateX(-100%)}to{transform:translateX(0)}}

  .drawer{width:300px; max-width:87%; height:100%; background:var(--paper); overflow-y:auto; animation:slideRight .26s cubic-bezier(.2,.8,.2,1); display:flex; flex-direction:column; padding-bottom:env(safe-area-inset-bottom, 0px);}
  .icon-btn{width:38px; height:38px; border-radius:12px; display:grid; place-items:center; transition:background .15s;}
  .icon-btn:active{background:var(--line);}

  .disc-head{display:flex; align-items:center; justify-content:space-between; width:100%; padding:13px 8px; text-align:left;}
  .disc-head .lbl{font-size:11px; font-weight:700; letter-spacing:.12em; text-transform:uppercase; color:var(--ink-faint);}
  .chev{transition:transform .2s;} .chev.open{transform:rotate(180deg);}
  .nav-item{display:flex; align-items:center; gap:12px; width:100%; padding:11px 10px; border-radius:12px; text-align:left; font-size:14.5px; color:var(--ink); transition:background .12s;}
  .nav-item:active{background:var(--sage-tint);}

  .popover{position:absolute; top:calc(54px + env(safe-area-inset-top, 0px)); right:14px; width:214px; background:var(--card); border:1px solid var(--line); border-radius:16px; box-shadow:0 14px 34px rgba(43,38,32,.18); padding:6px; z-index:70; animation:fade .14s ease;}
  .pop-item{display:flex; align-items:center; gap:11px; width:100%; padding:11px 12px; border-radius:11px; text-align:left; font-size:14px; color:var(--ink); transition:background .12s;}
  .pop-item:active{background:var(--paper2);}
  .pop-item.danger{color:var(--care);}
  .pop-sep{height:1px; background:var(--line); margin:5px 8px;}

  .switch{width:44px; height:26px; border-radius:99px; background:var(--line); position:relative; flex-shrink:0; transition:background .2s;}
  .switch.on{background:var(--sage);}
  .switch .knob{position:absolute; top:3px; left:3px; width:20px; height:20px; border-radius:99px; background:#fff; box-shadow:0 1px 3px rgba(0,0,0,.2); transition:left .2s;}
  .switch.on .knob{left:21px;}
  .pref{display:flex; align-items:center; gap:12px; padding:14px 0; border-bottom:1px solid var(--line);}
  .pref:last-child{border-bottom:none;}

  @media (prefers-reduced-motion: reduce){*{animation:none!important; transition:none!important;}}
</style>
</head>

const store = {
  read(){ try{ const r=localStorage.getItem('sprout.v1'); return r?JSON.parse(r):null; }catch(e){ return null; } },
  write(o){ try{ localStorage.setItem('sprout.v1', JSON.stringify(o)); }catch(e){ /* quota or sandbox: ignore */ } },
};
function saveState(){
  store.write({ onboarded:S.onboarded, profile:S.profile, settings:S.settings, done:S.done,
    keepsakes:S.keepsakes, favorites:S.favorites, history:S.history,
    xp:S.xp, earnedBadges:S.earnedBadges, counters:S.counters, currentMood:S.currentMood,
    habits:S.habits, sleep:S.sleep, groups:S.groups });
}
function hydrate(){
  const s=store.read(); if(!s) return;
  if(typeof s.onboarded==='boolean') S.onboarded=s.onboarded;
  if(s.profile) S.profile={...S.profile, ...s.profile};
  if(s.settings) S.settings={...S.settings, ...s.settings};
  if(Array.isArray(s.done)) S.done=s.done;
  if(Array.isArray(s.keepsakes)) S.keepsakes=s.keepsakes;
  if(Array.isArray(s.favorites)) S.favorites=s.favorites;
  if(Array.isArray(s.history)) S.history=s.history;
  if(typeof s.xp==='number') S.xp=s.xp;
  if(Array.isArray(s.earnedBadges)) S.earnedBadges=s.earnedBadges;
  if(s.counters) S.counters={...S.counters, ...s.counters};
  if(typeof s.currentMood==='number') S.currentMood=s.currentMood;
  if(Array.isArray(s.habits)) S.habits=s.habits;
  if(Array.isArray(s.sleep)) S.sleep=s.sleep;
  if(Array.isArray(s.groups)) S.groups=s.groups;
}

function levelIndex(xp){ let i=0; for(let k=0;k<LEVELS.length;k++){ if(xp>=LEVELS[k].min) i=k; } return i; }
function levelInfo(xp){
  const i=levelIndex(xp), cur=LEVELS[i], next=LEVELS[i+1];
  const into = xp - cur.min;
  const span = next ? next.min - cur.min : 1;
  return {i, name:cur.name, next:next?next.name:null, pct: next? Math.min(into/span,1) : 1, toNext: next? next.min - xp : 0};
}

function confetti(){
  if(S.settings.reduceMotion) return;
  const cols=['var(--sage)','var(--clay)','var(--dusk)','var(--honey)','var(--sage-mid)'];
  for(let i=0;i<26;i++){
    const c=document.createElement('div'); c.className='confetti';
    c.style.left=(Math.random()*100)+'vw';
    c.style.background=cols[i%cols.length];
    c.style.animationDelay=(Math.random()*.25)+'s';
    c.style.transform='translateY(-10vh)';
    document.body.appendChild(c);
    setTimeout(()=>c.remove(), 1900);
  }
}
let toastQ=[];
function toast(msg, icon){
  const t=document.createElement('div'); t.className='toast';
  t.innerHTML=`${icon?svg(icon,17,'var(--paper)'):''}<span>${msg}</span>`;
  document.body.appendChild(t);
  setTimeout(()=>t.remove(), 3000);
}
function celebrate(msg, icon){ toast(msg, icon||'sparkles'); confetti(); }

function grantXP(n){
  const before=levelIndex(S.xp);
  S.xp += n;
  const after=levelIndex(S.xp);
  // newly-earned badges
  BADGES.forEach(b=>{ if(!S.earnedBadges.includes(b.id) && b.has()){ S.earnedBadges.push(b.id); setTimeout(()=>celebrate('Badge earned · '+b.name,'sparkles'), 120); } });
  if(after>before){ setTimeout(()=>celebrate(`Level up! You’re a ${LEVELS[after].name}`,'sun'), 60); }
  saveState();
}

  if(e.includes('Exam pressure')||s==='student') return {t:'Steady nerves before they steady you',b:'Exam stress feeds on a racing body. We’ll work the body first, then the thoughts.',tool:'box'};
  if(e.includes('A breakup')||s==='trans') return {t:'Grief comes in waves — you don’t have to swim',b:'Some days are heavier. The aim isn’t to feel fine, it’s to feel held while it passes.',tool:'letter'};
  if(e.includes('Burnt out')||(s==='work'&&e.includes('Sleep is rough'))) return {t:'Burnout isn’t weakness, it’s a signal',b:'Let’s protect a little energy today instead of spending the last of it.',tool:'label'};
  if(e.includes('A new baby')||s==='parent') return {t:'You’re doing more than you can see',b:'On no sleep, “good enough” is the goal. Be as kind to yourself as you are to them.',tool:'soothe'};
  if(e.includes('Conflict at home')||s==='couple') return {t:'Connection over being right',b:'When things heat up, a pause protects the relationship more than the perfect comeback.',tool:'cooldown'};

}

function systemPrompt(p){
  const stage = (STAGES.find(s=>s.id===p.stage)||{}).label || 'unspecified';
  const ev = p.events.length?p.events.join(', '):'nothing specific yet';
  const ag = AGE_GROUPS.find(a=>a.id===S.settings.ageGroup);
  const ageTone = ag ? `\n- Audience: ${ag.label}. Tone: ${ag.note}` : '';
  const co = S.coach ? coachById(S.coach) : null;
  const coachLine = co ? `\n\nSPECIAL MODE — you are currently acting as a “${co.name}”. ${co.sys} Stay in this focus, but keep all the safety rules above.` : '';
  return `You are Lumi, a warm, grounded AI wellbeing companion inside an app called Sprout.

WHO YOU ARE
- A supportive companion and coach — NOT a therapist, doctor, or crisis service. Never diagnose, never prescribe, never claim to treat mental illness.
- You draw on evidence-based self-help ideas (CBT, ACT, DBT, mindfulness, narrative, somatic, positive psychology) and offer them as gentle, optional suggestions.

HOW YOU TALK
- Brief and human. Usually 2-5 sentences. One idea at a time.
- Validate the feeling first, in plain words, before any suggestion.
- Curious, not clinical. At most one gentle question per reply.
- When you suggest something, make it a tiny next step, never a lecture. No toxic positivity, never minimise.${ageTone}

BOUNDARIES
- For persistent, severe, or worsening symptoms, gently encourage speaking with a licensed professional and remind them Sprout can connect them with one.

SAFETY - MOST IMPORTANT
- If the person mentions wanting to die, suicide, self-harm, not wanting to exist, or harming someone: respond with warmth, no judgment, no lecture. Take it seriously and stay calm. Gently encourage them to reach out right now to a crisis line and someone they trust, and to tap "Get help now" in the app. Never describe or discuss methods. Make clear they deserve support and are not a burden. Stay with them emotionally.

THE PERSON
- Life stage: ${stage}
- What's going on: ${ev}
Use this naturally to keep support relevant. Don't recite it back.${coachLine}`;
}
function fallbackReply(text){
  const t=text.toLowerCase();
  if(flagsCrisis(t)) return 'I’m really glad you told me, and you’re not a burden for feeling this way. You deserve support right now — please reach out to someone you trust, and tap “Get help now” at the top to reach a crisis line. I’m here with you. Would you tell me a little about what today’s been like?';
  if(/(anx|panic|nervous|scared|worr)/.test(t)) return 'That sounds genuinely hard — anxiety makes everything feel urgent at once. Let’s slow the body before the thoughts; would a two-minute breathing reset feel okay? It’s in your Toolkit, or tell me more first.';
  if(/(sad|down|depress|empty|numb|low|hopeless)/.test(t)) return 'I hear how heavy this feels, and I’m glad you said it out loud rather than carrying it alone. You don’t have to fix the whole feeling today. What’s one small thing that’s felt even slightly okay lately?';
  if(/(angry|furious|frustrat|fight|argument)/.test(t)) return 'That frustration makes sense — it usually means something mattered to you. Before any next move, a pause can protect more than the perfect response. Want to talk through what’s underneath it?';
  if(/(tired|exhaust|burn|overwhelm|too much)/.test(t)) return 'It sounds like you’re running on empty — and that’s a signal worth listening to, not pushing through. What would protecting a little energy look like for the rest of today?';
  return 'Thank you for trusting me with that. I’m listening — tell me a bit more about what’s sitting with you, and we’ll take it one small step at a time.';
}

  wrap.appendChild(node(`<div style="font-size:13.5px;color:var(--ink-soft);margin-top:4px;line-height:1.45;">Short, evidence-informed practices from many therapeutic approaches. Tap an approach to explore it — these are skills, not treatment.</div>`));

  wrap.appendChild(node(`<div style="position:relative;margin-top:14px;">
    <span style="position:absolute;left:13px;top:50%;transform:translateY(-50%);opacity:.5;">${svg('compass',17,'var(--ink-soft)')}</span>
    <input id="toolSearch" value="${(S.search||'').replace(/"/g,'&quot;')}" placeholder="Search practices…" oninput="App.search(this.value)" style="width:100%;padding:12px 14px 12px 40px;border-radius:14px;font-size:14.5px;"/>
  </div>`));

  const used = Array.from(new Set(TOOLS.map(t=>t.mod)));

  chips.appendChild(mk('all','All approaches'));
  chips.appendChild(mk('fav', `Favourites${S.favorites.length?' · '+S.favorites.length:''}`, ''));
  used.forEach(m=>chips.appendChild(mk(m,MOD[m].label)));
  wrap.appendChild(chips);

  if(S.modFilter!=='all' && S.modFilter!=='fav'){
    const m=MOD[S.modFilter];
    wrap.appendChild(node(`<div style="margin-top:14px;padding:14px;border-radius:18px;background:color-mix(in srgb,${m.color} 9%,transparent);display:flex;gap:11px;align-items:flex-start;">

  }

  const q=(S.search||'').trim().toLowerCase();
  let items = TOOLS.filter(t=>{
    if(S.modFilter==='fav') return S.favorites.includes(t.id);

  });

  const list=node('<div style="margin-top:14px;display:grid;gap:11px;"></div>');
  if(items.length===0){
    list.appendChild(node(`<div style="padding:26px;text-align:center;color:var(--ink-faint);font-size:14px;">${S.modFilter==='fav'?'No favourites yet — tap the heart on a practice to save it.':'Nothing matches that search.'}</div>`));
  }
  items.forEach(t=>{
    const m=MOD[t.mod], done=S.done.includes(t.id), fav=S.favorites.includes(t.id);

      </button>
      <button class="tap" aria-label="Favourite" onclick="App.toggleFav('${t.id}')" style="width:38px;height:38px;border-radius:12px;display:grid;place-items:center;background:${fav?'var(--clay-tint)':'transparent'};">${svg('heart',19,fav?'var(--clay)':'var(--ink-faint)')}</button>
    </div>`);
    list.appendChild(row);
  });
  wrap.appendChild(list);
  return wrap;
}

/* ---------------------------- INSIGHTS ---------------------------- */
function renderInsights(){
  const W=360,H=130,pad=10,maxMood=5;
  const xStep=(W-pad*2)/(MOOD_DATA.length-1);
  const pts=MOOD_DATA.map((d,i)=>({x:pad+i*xStep,y:pad+(H-pad*2)*(1-(d.mood-1)/(maxMood-1)),...d}));
  const path=pts.map((p,i)=>`${i===0?'M':'L'} ${p.x.toFixed(1)} ${p.y.toFixed(1)}`).join(' ');
  let bars=''; pts.forEach(p=>{const bh=(p.sleep/9)*(H-pad*2); bars+=`<rect x="${p.x-7}" y="${H-pad-bh}" width="14" height="${bh}" rx="3" fill="var(--sage-tint)"/>`;});
  let dots=''; pts.forEach(p=>{dots+=`<circle cx="${p.x}" cy="${p.y}" r="3.5" fill="var(--clay)" stroke="#fff" stroke-width="1.5"/>`;});
  let labels=''; MOOD_DATA.forEach(d=>{labels+=`<span style="font-size:9.5px;color:var(--ink-faint);width:14px;text-align:center;">${d.d}</span>`;});

  const patterns=[
    {icon:'moon',color:'var(--dusk)',t:'Sleep is steering your mood',b:'On nights under ~5½ hours, your next day averaged “low.” Over 7 hours, it averaged “good.” Sleep looks like your strongest lever right now.',e:'Tonight: try the 5-min wind-down. One night, not a streak.'},
    {icon:'leaf',color:'var(--sage)',t:'Moving your body lifts the needle',b:'Every day you tagged a walk, you rated your mood “good” or better — no exceptions in the last two weeks.',e:'This week: one 10-minute walk on a heavier day.'},
    {icon:'waves',color:'var(--clay)',t:'Wednesdays run hot',b:'Your low-mood and conflict days cluster midweek. Worth planning a lighter Wednesday rather than powering through.',e:'Pre-load the cool-down tool for Wednesday.'},
  ];

  const wrap=node('<div class="pad"></div>');
  wrap.appendChild(node(`<div class="h1" style="font-size:25px;margin-top:6px;">Patterns I’m noticing</div>`));
  wrap.appendChild(node(`<div style="font-size:13.5px;color:var(--ink-soft);margin-top:4px;line-height:1.45;">I connect the dots across sleep, movement and mood — the links most apps leave as separate charts.</div>`));

  if(S.history.length){
    const recent = S.history.slice(0,14).reverse();
    const moodColor = m => MOODS[(m||1)-1].color;
    let hdots=''; recent.forEach(h=>{ hdots+=`<div title="${h.date}" style="flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;"><div style="width:16px;height:16px;border-radius:99px;background:${moodColor(h.mood)};"></div></div>`; });
    wrap.appendChild(node(`
      <div class="card" style="margin-top:16px;">
        <div style="display:flex;justify-content:space-between;align-items:baseline;"><div class="eyebrow" style="color:var(--sage);">Your check-ins</div><span style="font-size:11.5px;color:var(--ink-faint);">${S.history.length} logged</span></div>
        <div style="display:flex;gap:4px;margin-top:12px;">${hdots}</div>
        <div style="font-size:11.5px;color:var(--ink-faint);margin-top:10px;">Your real entries. Keep checking in and richer patterns will grow here.</div>
      </div>`));
  }

  wrap.appendChild(node(`
    <div class="card" style="margin-top:14px;">
      <div style="display:flex;justify-content:space-between;align-items:baseline;"><div class="eyebrow">Example · last 14 days</div><span style="font-size:11.5px;color:var(--ink-faint);">mood · sleep</span></div>
      <svg width="100%" viewBox="0 0 ${W} ${H}" style="margin-top:10px;">${bars}<path d="${path}" fill="none" stroke="var(--clay)" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>${dots}</svg>
      <div style="display:flex;justify-content:space-between;margin-top:2px;">${labels}</div>
      <div style="display:flex;gap:16px;margin-top:12px;font-size:11.5px;color:var(--ink-soft);">
        <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:3px;background:var(--clay);border-radius:9px;"></span> mood</span>
        <span style="display:flex;align-items:center;gap:5px;"><span style="width:10px;height:10px;background:var(--sage-tint);border-radius:3px;"></span> hours slept</span>
      </div>
    </div>`));
  wrap.appendChild(node(`<div style="margin-top:20px;margin-bottom:10px;"><div class="eyebrow" style="color:var(--dusk);">What it’s telling us</div></div>`));
  const list=node('<div style="display:grid;gap:12px;"></div>');
  patterns.forEach(p=>{
    list.appendChild(node(`
      <div class="card">

/* ---------------------------- overlays ---------------------------- */
function overlay(inner){
  const ov=node('<div class="overlay"></div>');
  ov.addEventListener('click',()=>ov.remove());
  const sheet=node('<div class="sheet"></div>');
  sheet.addEventListener('click',e=>e.stopPropagation());
  sheet.appendChild(node('<div class="grip"></div>'));
  sheet.appendChild(inner);
  ov.appendChild(sheet); phone.appendChild(ov); return ov;
}

function reflectPrompt(){
  return `You are Lumi, a warm AI companion. Someone has just finished a creative or journaling wellbeing exercise and is privately sharing what they made.

YOUR JOB
- Offer a brief, warm, encouraging reflection on their creative expression — 2-4 sentences. Notice effort, colour, mood, or theme with curiosity and care.
- This is NOT an evaluation, a grade, or a check that they "really did it." Never judge quality, never verify, never say whether it counts.
- End with one gentle, open question or a kind invitation — no pressure.

IMPORTANT SAFETY
- If the image appears to show a person, a face, or anything personally identifying, do NOT describe or analyse the person. Gently say you'll focus on the feelings or the creative side instead, and you can keep things to their words.
- Never diagnose. You are a supportive companion, not a therapist.`;
}
function fallbackReflection(note){
  if(note && note.trim()) return `Thank you for sharing this with me — what you wrote (“${note.trim().slice(0,80)}”) takes honesty. There’s no right or wrong here; you showed up and made something, and that counts. What felt different, even slightly, after doing it?`;
  return `Thank you for trusting me with this. Making something — however it turned out — is its own kind of care, and you did it. What was it like to sit with this for a few minutes?`;
}

let breatheTimer=null;
function openBreathe(){
  const inner=node('<div style="padding:26px 22px 30px;text-align:center;"></div>');
  inner.appendChild(node(`<div class="h1" style="font-size:22px;">Take a breath</div>`));
  inner.appendChild(node(`<div style="font-size:13px;color:var(--ink-soft);margin-top:6px;">Follow the circle. In for 4, hold 4, out for 4.</div>`));
  inner.appendChild(node(`
    <div style="height:240px;display:grid;place-items:center;margin-top:10px;">
      <div style="position:relative;width:200px;height:200px;display:grid;place-items:center;">
        <div id="breatheCircle" style="width:90px;height:90px;border-radius:99px;background:radial-gradient(circle at 35% 30%, var(--sage-mid), var(--sage));box-shadow:0 0 40px color-mix(in srgb,var(--sage) 45%,transparent);"></div>
        <div id="breathePhase" style="position:absolute;font-size:16px;font-weight:600;color:#fff;">Breathe in</div>
      </div>
    </div>`));
  inner.appendChild(node(`<button class="btn btn-ghost btn-block" style="margin-top:18px;" onclick="App.closeBreathe()">I feel steadier</button>`));
  inner.appendChild(node(`<style>
    @keyframes breatheAnim {
      0%   { transform:scale(1);   }
      25%  { transform:scale(2.1); }
      50%  { transform:scale(2.1); }
      75%  { transform:scale(1);   }
      100% { transform:scale(1);   }
    }
    #breatheCircle{ animation:breatheAnim 16s ease-in-out infinite; }
  </style>`));
  const ov=overlay(inner); ov.querySelector('.sheet').style.zoom=String(S.settings.textSize||1);

  const phases=[['Breathe in',0],['Hold',4],['Breathe out',8],['Hold',12]];
  const phaseEl=()=>document.getElementById('breathePhase');
  const tick=()=>{
    const el=phaseEl(); if(!el){ clearInterval(breatheTimer); return; }
    const s=Math.floor((Date.now()/1000)%16);
    let label='Breathe in';
    for(const [lab,start] of phases){ if(s>=start) label=lab; }
    el.textContent=label;
  };
  clearInterval(breatheTimer); breatheTimer=setInterval(tick,250); tick();
}

/* ========================= SOUNDSCAPES (Web Audio) ========================= */
let audioCtx=null, soundNodes=null, soundActive=null;
function ensureAudio(){ if(!audioCtx){ try{ audioCtx=new (window.AudioContext||window.webkitAudioContext)(); }catch(e){ return null; } } if(audioCtx&&audioCtx.state==='suspended') audioCtx.resume(); return audioCtx; }
function noiseBuffer(ctx){ const len=ctx.sampleRate*2, b=ctx.createBuffer(1,len,ctx.sampleRate), d=b.getChannelData(0); for(let i=0;i<len;i++) d[i]=Math.random()*2-1; return b; }
const SCAPES=[
  {id:'rain', name:'Rain', icon:'waves'}, {id:'waves', name:'Ocean', icon:'waves'},
  {id:'wind', name:'Wind', icon:'wind'},  {id:'brown', name:'Deep noise', icon:'volume'},
  {id:'night',name:'Night', icon:'moon'},
];
function playSound(id){
  const ctx=ensureAudio(); if(!ctx) return; stopSound();
  const src=ctx.createBufferSource(); src.buffer=noiseBuffer(ctx); src.loop=true;
  const filt=ctx.createBiquadFilter(), gain=ctx.createGain();
  const base=(S.settings.soundVol??0.5)*0.35; gain.gain.value=base;
  let lfo=null, lfoGain=null;
  if(id==='rain'){ filt.type='highpass'; filt.frequency.value=1200; }
  else if(id==='waves'){ filt.type='lowpass'; filt.frequency.value=600; lfo=ctx.createOscillator(); lfo.frequency.value=0.12; lfoGain=ctx.createGain(); lfoGain.gain.value=base*0.85; lfo.connect(lfoGain); lfoGain.connect(gain.gain); lfo.start(); }
  else if(id==='wind'){ filt.type='bandpass'; filt.frequency.value=500; filt.Q.value=0.6; lfo=ctx.createOscillator(); lfo.frequency.value=0.08; lfoGain=ctx.createGain(); lfoGain.gain.value=280; lfo.connect(lfoGain); lfoGain.connect(filt.frequency); lfo.start(); }
  else if(id==='brown'){ filt.type='lowpass'; filt.frequency.value=220; }
  else { filt.type='lowpass'; filt.frequency.value=380; }
  src.connect(filt); filt.connect(gain); gain.connect(ctx.destination); src.start();
  soundNodes={src,gain,lfo}; soundActive=id;
}
function stopSound(){ if(soundNodes){ try{soundNodes.src.stop();}catch(e){} try{soundNodes.lfo&&soundNodes.lfo.stop();}catch(e){} } soundNodes=null; soundActive=null; }
function setSoundVol(v){ S.settings.soundVol=v; if(soundNodes) soundNodes.gain.gain.value=v*0.35; saveState(); }

/* ============================ FOCUS TIMER ============================ */
let focusTimer=null, focusEnd=0, focusPaused=0, focusRunning=false;
function focusTick(){ const el=document.getElementById('focusClock'); if(!el){ clearInterval(focusTimer); return; } const left=Math.max(0, Math.round((focusEnd-Date.now())/1000)); el.textContent=`${String(Math.floor(left/60)).padStart(2,'0')}:${String(left%60).padStart(2,'0')}`; if(left<=0){ clearInterval(focusTimer); focusRunning=false; try{ if(S.settings.sound){ const c=ensureAudio(); if(c){ const o=c.createOscillator(),g=c.createGain(); o.frequency.value=660; g.gain.value=.0001; o.connect(g); g.connect(c.destination); o.start(); g.gain.exponentialRampToValueAtTime(.2, c.currentTime+.05); g.gain.exponentialRampToValueAtTime(.0001, c.currentTime+1.2); o.stop(c.currentTime+1.3);} } }catch(e){} const s=document.getElementById('focusState'); if(s) s.textContent='Done — nice focus.'; } }

/* ========================= VOICE (Web Speech API) ========================= */
const SRClass = window.SpeechRecognition || window.webkitSpeechRecognition;
const voiceSupported = !!SRClass;
let activeRec=null;
function startListening(cb){
  if(!SRClass){ cb.err&&cb.err('unsupported'); return; }
  try{
    const r=new SRClass(); r.lang=S.settings.voiceLang||'en-US'; r.interimResults=true; r.continuous=false; r.maxAlternatives=1;
    let done=false;
    r.onresult=e=>{ let interim='',fin=''; for(let i=e.resultIndex;i<e.results.length;i++){ const res=e.results[i]; if(res.isFinal) fin+=res[0].transcript; else interim+=res[0].transcript; } if(interim) cb.interim&&cb.interim(interim); if(fin&&!done){ done=true; try{r.stop();}catch(_){}; activeRec=null; cb.final&&cb.final(fin.trim()); } };
    r.onerror=e=>{ done=true; activeRec=null; cb.err&&cb.err(e.error||'error'); };
    r.onend=()=>{ activeRec=null; cb.end&&cb.end(); };
    activeRec=r; r.start();
  }catch(e){ cb.err&&cb.err('error'); }
}
function stopListening(){ try{ activeRec&&activeRec.stop(); }catch(e){} activeRec=null; }
function speak(t){ if(!('speechSynthesis'in window)||!t) return; try{ speechSynthesis.cancel(); const u=new SpeechSynthesisUtterance(t); u.rate=.98; u.lang=S.settings.voiceLang||'en-US'; speechSynthesis.speak(u); }catch(e){} }
function stopSpeaking(){ try{ 'speechSynthesis'in window && speechSynthesis.cancel(); }catch(e){} }
function runVoiceCommand(text){
  const t=(text||'').toLowerCase().trim(); if(!t) return {ok:false};
  const go=(tab,l)=>{ App.closeOverlay(); S.tab=tab; render(); return {ok:true,label:l}; };
  if(flagsCrisis(t)||/\b(crisis|emergency|help me now|hotline|helpline)\b/.test(t)){ App.closeOverlay(); openCrisis(); return {ok:true,label:'Opening support'}; }
  if(/\b(home|today)\b/.test(t)) return go('today','Home');
  if(/\b(breath|breathe|calm|panic|relax)\b/.test(t)){ App.closeOverlay(); openBreathe(); return {ok:true,label:'Breathing'}; }
  if(/\b(check ?in|log mood|how am i|mood)\b/.test(t)) return go('checkin','Check-in');
  if(/\b(talk|chat|lumi|companion|vent)\b/.test(t)) return go('companion','Talk to Lumi');
  if(/\b(tool ?kit|tools|practice|exercise|therap)\b/.test(t)) return go('toolkit','Toolkit');
  if(/\b(pattern|insight|chart)\b/.test(t)) return go('insights','Patterns');
  if(/\b(report)\b/.test(t)) return go('reports','Reports');
  if(/\b(habit)\b/.test(t)) return go('habits','Habits');
  if(/\b(sound|rain|ocean|noise|ambient)\b/.test(t)){ App.closeOverlay(); openSounds(); return {ok:true,label:'Soundscapes'}; }
  if(/\b(focus|timer|pomodoro|study)\b/.test(t)){ App.closeOverlay(); openFocus(); return {ok:true,label:'Focus timer'}; }
  if(/\b(coach)\b/.test(t)) return go('more','Coaches & tools');
  if(/\b(reward|badge|growth|xp|level)\b/.test(t)) return go('rewards','Your growth');
  if(/\b(profile|account)\b/.test(t)) return go('profile','Profile');
  if(/\b(feature)\b/.test(t)) return go('features','Features');
  if(/\bdark mode\b/.test(t)){ S.settings.theme='midnight'; App.closeOverlay(); render(); return {ok:true,label:'Dark theme'}; }
  if(/\b(light mode|light theme)\b/.test(t)){ S.settings.theme='sage'; App.closeOverlay(); render(); return {ok:true,label:'Light theme'}; }
  const th=Object.keys(THEMES).find(id=> t.includes(THEMES[id].label.toLowerCase()));
  if(th){ S.settings.theme=th; App.closeOverlay(); render(); return {ok:true,label:THEMES[th].label+' theme'}; }
  const sm=t.match(/search (?:for )?(.+)/); if(sm){ App.closeOverlay(); S.tab='toolkit'; S.search=sm[1]; render(); return {ok:true,label:'Searching'}; }
  if(/\b(read|speak|say)\b.*\b(that|it|aloud|last)\b/.test(t)){ const last=[...S.chat].reverse().find(m=>m.role==='assistant'); if(last){ speak(last.content); return {ok:true,label:'Reading aloud'}; } }
  if(/\bstop\b/.test(t)){ stopSpeaking(); return {ok:true,label:'Stopped'}; }
  return {ok:false, text:t};
}

/* ------------------------------ reports screen -------------------------- */
function reportStats(days){
  const cut=Date.now()-days*86400000;
  const h=S.history.filter(x=>x.ts>=cut);
  if(!h.length) return null;
  const avg=h.reduce((a,b)=>a+(b.mood||0),0)/h.length;
  const firstHalf=h.slice(Math.floor(h.length/2)), secondHalf=h.slice(0,Math.floor(h.length/2));
  const am=arr=>arr.length?arr.reduce((a,b)=>a+(b.mood||0),0)/arr.length:0;
  const trend = am(secondHalf)-am(firstHalf); // recent minus older (history is newest-first)
  const tags={}; h.forEach(x=>(x.feels||[]).forEach(f=>tags[f]=(tags[f]||0)+1));
  const topTags=Object.entries(tags).sort((a,b)=>b[1]-a[1]).slice(0,3).map(x=>x[0]);
  return {count:h.length, avg, trend, topTags};
}
function burnoutSignal(){
  const r=reportStats(14); const s=S.sleep.slice(0,7);
  const lowSleep = s.length? (s.reduce((a,b)=>a+b.score,0)/s.length)<55 : false;
  if(!r) return null;
  const risk = (r.avg<2.6?1:0) + (r.trend<-0.3?1:0) + (lowSleep?1:0) + (r.topTags.some(t=>['tired','overwhelmed','stuck','numb'].includes(t))?1:0);
  return {level: risk>=3?'high':risk>=2?'watch':'low', r};
}
function renderReports(){
  const wk=reportStats(7), mo=reportStats(30), bo=burnoutSignal();
  const wrap=node('<div class="pad"></div>');
  wrap.appendChild(node(`<button class="tap" onclick="App.go('more')" style="display:flex;align-items:center;gap:6px;color:var(--ink-soft);font-size:13.5px;margin-top:6px;">${svg('chevL',16,'var(--ink-soft)')} Back</button>`));
  wrap.appendChild(node(`<div class="h1" style="font-size:26px;margin-top:10px;">Your reports</div>`));
  wrap.appendChild(node(`<div style="font-size:13.5px;color:var(--ink-soft);margin-top:4px;line-height:1.45;">Gentle summaries from your real check-ins.</div>`));
  const moodWord=m=> m>=4.3?'good':m>=3.3?'okay–good':m>=2.6?'mixed':m>=1.8?'low':'heavy';
  const trendWord=t=> t>0.25?'lifting':t<-0.25?'dipping':'steady';
  const card=(title,st)=> st? `<div class="card" style="margin-top:12px;"><div class="eyebrow" style="color:var(--sage);">${title}</div><div style="font-family:var(--serif);font-size:20px;margin-top:6px;">Mostly ${moodWord(st.avg)} · trend ${trendWord(st.trend)}</div><div style="font-size:13px;color:var(--ink-soft);margin-top:6px;line-height:1.5;">${st.count} check-in${st.count>1?'s':''}.${st.topTags.length?' Common: '+st.topTags.join(', ')+'.':''}</div></div>` : `<div class="card" style="margin-top:12px;color:var(--ink-faint);font-size:13.5px;">Not enough check-ins yet for this period — keep going.</div>`;
  wrap.appendChild(node(card('This week', wk)));
  wrap.appendChild(node(card('This month', mo)));

  if(bo){
    const map={high:{c:'var(--care)',t:'Worth a gentle pause',b:'A few signals point to running low — lighter days, more rest, and reaching for support would be kind right now. If it persists, a professional can really help.'},
      watch:{c:'var(--honey)',t:'Keep an eye in',b:'Some early signs of strain. A little extra rest and self-kindness this week could help.'},
      low:{c:'var(--sage)',t:'Holding steady',b:'No strong signs of burnout right now. Keep tending to yourself.'}};
    const m=map[bo.level];
    wrap.appendChild(node(`<div style="margin-top:22px;margin-bottom:10px;"><div class="eyebrow" style="color:${m.c};">Burnout signal</div></div>`));
    wrap.appendChild(node(`<div class="card" style="border-color:${m.c}55;"><div style="display:flex;gap:11px;align-items:flex-start;">${svg('activity',20,m.c)}<div><div style="font-size:15.5px;font-weight:600;">${m.t}</div><div style="font-size:13px;color:var(--ink-soft);margin-top:5px;line-height:1.5;">${m.b}</div></div></div></div>`));
    wrap.appendChild(node(`<div style="margin-top:12px;font-size:11.5px;color:var(--ink-faint);text-align:center;line-height:1.5;">A gentle heuristic from your own data — not a diagnosis. If you’re struggling, please talk to someone you trust or a professional.</div>`));
  } else {
    wrap.appendChild(node(`<div style="margin-top:20px;font-size:12.5px;color:var(--ink-faint);text-align:center;">Log a few check-ins and a burnout signal will appear here.</div>`));
  }
  return wrap;
}

/* ===================== CONNECT DEVICES (Web Bluetooth) ===================== */
let hrDevice=null, hrChar=null;
async function connectHR(){
  if(!navigator.bluetooth){ toast('Bluetooth needs Chrome/Edge + HTTPS','info'); return; }
  try{
    const dev=await navigator.bluetooth.requestDevice({ filters:[{services:['heart_rate']}] });
    hrDevice=dev; dev.addEventListener('gattserverdisconnected', onHRDisconnect);
    const server=await dev.gatt.connect();
    const svc=await server.getPrimaryService('heart_rate');
    hrChar=await svc.getCharacteristic('heart_rate_measurement');
    await hrChar.startNotifications();
    hrChar.addEventListener('characteristicvaluechanged', e=>{ const bpm=parseHR(e.target.value); S.hr={connected:true,bpm}; const el=$('#hrValue'); if(el){ el.textContent=bpm; const z=$('#hrZone'); if(z) z.textContent=hrZone(bpm); } else render(); });
    S.hr.connected=true; toast('Heart-rate connected','check'); render();
  }catch(e){ /* user cancelled or failed */ }
}
function parseHR(v){ const flags=v.getUint8(0); return (flags&0x1)? v.getUint16(1,true) : v.getUint8(1); }
function onHRDisconnect(){ S.hr={connected:false,bpm:null}; hrChar=null; render(); }
function disconnectHR(){ try{ hrDevice&&hrDevice.gatt.connected&&hrDevice.gatt.disconnect(); }catch(e){} S.hr={connected:false,bpm:null}; render(); }
function hrZone(b){ if(b<60) return 'resting · very calm'; if(b<72) return 'calm'; if(b<88) return 'relaxed–alert'; if(b<104) return 'activated'; return 'elevated · try a breath'; }

    if(keepsake){
      const noteEl=$('#keepNote'); const note = noteEl ? noteEl.value.trim() : '';

        const t = TOOLS.find(x=>x.id===id);

      content.push({type:'text', text:`Exercise: ${k.title}. ${k.note?('My note: '+k.note):'No note added.'} Please reflect kindly.`});
      const res=await fetch('https://api.anthropic.com/v1/messages',{

      });
      const data=await res.json();
      reply=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();

  openPrivacy(){ App.closeOverlay(); openPrivacy(); },
  openAbout(){ App.closeOverlay(); openAbout(); },
  openStagePicker(){ openStagePicker(); },
  setStageProfile(id){ S.profile.stage=id; App.closeOverlay(); render(); },
  toggleEventProfile(e){ const a=S.profile.events; S.profile.events=a.includes(e)?a.filter(x=>x!==e):[...a,e]; render(); },
  setName(v){ S.profile.name=v; saveState(); },
  toggle(key, fromSheet){ S.settings[key]=!S.settings[key]; saveState(); if(fromSheet){ App.closeOverlay(); openSettings(); } else { render(); } },
  exportData(){
    App.closeOverlay();
    const payload={ profile:S.profile, settings:S.settings, done:S.done,
      keepsakes:S.keepsakes.map(k=>({title:k.title, mod:k.mod, note:k.note, date:k.date, photo:k.img?'[image kept on device]':null})),
      exportedAt:new Date().toISOString() };
    const blob=new Blob([JSON.stringify(payload,null,2)],{type:'application/json'});
    const url=URL.createObjectURL(blob); const a=document.createElement('a');
    a.href=url; a.download='sprout-my-data.json'; document.body.appendChild(a); a.click(); a.remove(); URL.revokeObjectURL(url);
  },
  confirmClear(){ App.closeOverlay(); confirmClear(); },
  clearData(){ S.keepsakes=[]; S.done=[]; S.chat=[]; S.crisisFlag=false; S.checkin={phase:'mood',mood:null,feels:[]}; App.closeOverlay(); render(); },
  setMod(m){ S.modFilter=m; render(); },
  pickMood(v){ S.checkin.mood=v; render(); },
  toggleFeel(f){ const a=S.checkin.feels; S.checkin.feels=a.includes(f)?a.filter(x=>x!==f):[...a,f]; render(); },
  checkPhase(p){ S.checkin.phase=p; render(); },
  resetCheck(){ S.checkin={phase:'mood',mood:null,feels:[]}; render(); },
  grow(el){ el.style.height='auto'; el.style.height=Math.min(el.scrollHeight,120)+'px'; const b=$('#sendBtn'); if(b) b.style.background=el.value.trim()?'var(--sage)':'var(--line)'; },
  keydown(e){ if(e.key==='Enter'&&!e.shiftKey){ e.preventDefault(); App.send(); } },
  async send(){
    const inp=$('#chatInput'); if(!inp) return;
    const text=inp.value.trim(); if(!text) return;
    if(flagsCrisis(text)){ S.crisisFlag=true; }
    S.chat.push({role:'user',content:text});
    inp.value=''; App.grow(inp);
    const sc=$('#chatScroll');
    if(S.crisisFlag && !$('#crisisBanner')){ render(); }
    else { sc.appendChild(bubble('user',text)); }
    const sc2=$('#chatScroll'); sc2.scrollTop=sc2.scrollHeight;
    const typing=node(`<div id="typing" style="display:flex;align-items:center;gap:8px;margin-left:36px;color:var(--ink-faint);font-size:13px;"><span class="dot"></span> Lumi is thinking…</div>`);
    sc2.appendChild(typing); sc2.scrollTop=sc2.scrollHeight;

    let reply='';
    try{
      const res=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST', headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ model:'claude-sonnet-4-6', max_tokens:1000,
          system:systemPrompt(S.profile),
          messages:S.chat.slice(-12).map(m=>({role:m.role,content:m.content})) })
      });
      const data=await res.json();
      reply=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('\n').trim();
    }catch(e){ reply=''; }
    if(!reply) reply=fallbackReply(text);
    S.chat.push({role:'assistant',content:reply});
    saveState();
    if(S.settings.speakReplies) speak(reply);
    const tp=$('#typing'); if(tp) tp.remove();
    const sc3=$('#chatScroll'); if(sc3){ sc3.appendChild(bubble('assistant',reply)); sc3.scrollTop=sc3.scrollHeight; }
  },
};
window.App = App;
hydrate();
render();

/* register service worker for offline + installability (only works when hosted over https/localhost) */
if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('./sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
